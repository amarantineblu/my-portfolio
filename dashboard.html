<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Page - Marcus Lebanon Elioma</title>

  <!-- Bootstrap CSS -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet" 
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
    crossorigin="anonymous"
  >

  <!-- Font Awesome -->
  <link 
    rel="stylesheet" 
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" 
    crossorigin="anonymous" 
    referrerpolicy="no-referrer"
  />

  <style>
    body {
      font-family: Arial, sans-serif;
    }
    #sidebar {
      min-height: 100vh;
      background-color: #343a40;
      transition: all 0.3s;
    }
    #sidebar .nav-link {
      color: #fff;
    }
    #sidebar .nav-link.active {
      background-color: #495057;
    }
    #sidebar.collapsed {
      margin-left: -250px;
    }
    #content {
      padding: 20px;
      transition: margin-left 0.3s;
    }
    #content.expanded {
      margin-left: 0;
    }
  </style>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dash">
  <!-- Header Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <button class="btn btn-outline-light me-2" id="toggleSidebar">
        <img class="img-icon" width="50" height="50" src="https://img.icons8.com/ios/50/xbox-menu.png" alt="xbox-menu"/>      </button>
      <a class="navbar-brand" href="#">My Dashboard</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Profile</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="d-flex">
    <!-- Sidebar -->
    <nav id="sidebar" class="col-md-2 d-md-block bg-dark sidebar">
      <div class="position-sticky">
        <ul class="nav flex-column p-3">
          <li class="nav-item">
            <a class="nav-link active" href="#"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#"><i class="fas fa-users"></i> Visitors</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#"><i class="fas fa-folder"></i> Projects</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#"><i class="fas fa-cogs"></i> Settings</a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- Main Content -->
    <main id="content" class="flex-grow-1">
      <h1 class="mb-4">Dashboard Overview</h1>

      <!-- Visitors Card -->
      <div class="card text-bg-info mb-4">
        <div class="card-body">
          <h5 class="card-title"><i class="fas fa-users"></i> Visitors</h5>
          <p class="card-text fs-3">2,345</p>
        </div>
      </div>

      <!-- Projects Section -->
      <div class="card">
        <div class="card-header">
          <i class="fas fa-folder"></i> My Projects
        </div>
        <div class="card-body">
          <table class="table table-striped">
            <thead>
              <tr>
                <th>Project Name</th>
                <th>Status</th>
                <th>Last Updated</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Portfolio Website</td>
                <td><span class="badge bg-success">Completed</span></td>
                <td>2026-05-20</td>
              </tr>
              <tr>
                <td>Attendance Manager</td>
                <td><span class="badge bg-warning">In Progress</span></td>
                <td>2026-06-01</td>
              </tr>
              <tr>
                <td>Dashboard App</td>
                <td><span class="badge bg-info">Testing</span></td>
                <td>2026-06-03</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Bootstrap JS -->
  <script 
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
    crossorigin="anonymous">
  </script>

  <!-- Sidebar Toggle Script -->
  <script>
    const toggleBtn = document.getElementById('toggleSidebar');
    const sidebar = document.getElementById('sidebar');
    const content = document.getElementById('content');

    toggleBtn.addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
      content.classList.toggle('expanded');
    });
  </script>
</body>
</html>
