<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="some.css">
  <title>Document</title>
</head>
<body>
  <div class="landing-wrapper">
    <div class="portrait">
      <img src="/assets/images/IMG-20251005-WA0029.jpg" alt="Portrait of Lebanon Marcus">
    </div>
    <div>
      <div class="hero-text">
        <span>Hello I'm</span><br>
        <span class="big-shadowy-text glossy-text">Lebanon Marcus</span>
      </div>
      <div class="glass-text">
        <p>I'm a Full Stack Developer <br> and I love to <br>
          <span class="big-shadowy-text glossy-text">Debug</span><br>
          and craft immersive web experiences.
        </p>
      </div>
      <div class="hero-about-me">
        <div class="critical-thinking hero-about-me-box p-2">
          <i class="icon bi bi-lightbulb-fill"></i>Critical Thinking
        </div>
        <div class="attention-to-detail hero-about-me-box p-2">
          <i class="icon bi bi-file-earmark-richtext-fill"></i>Attention to Detail
        </div>
        <div class="visual-aesthetics hero-about-me-box p-2">
          <i class="icon bi bi-palette-fill"></i>Visual Aesthetics
        </div>
        <div class="creativity hero-about-me-box p-2">
          <i class="icon bi bi-brush-fill"></i>Creativity
        </div>
        <div class="organized hero-about-me-box p-2">
          <i class="icon bi bi-folder-fill"></i>Organized
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
</body>
</html>
