<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Text Mask Poster</title>
  <link rel="stylesheet" href="some.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
</head>
<body>

<div class="poster">
  <!-- Background Image -->
   <div class="background-image">
    
   </div>
  <img src="/assets/images/GAC Phantom by Dennis Zerbe _ by zrb_105.jpg" alt="Your Image" class="background-image" />

  <!-- Top Info -->
  <div class="top-text">
    <span class="left">THE GEN-Z ICON</span>
    <span class="right">9× GRAMMY WINNER</span>
  </div>

  <div class="quote">YOU SHOULD SEE ME IN A CROWN</div>

  <!-- Clipped Text -->
  <div class="text-mask">
    <h1> <span> BILLIE <br>
    EILISH </span> </h1>
  </div>

  <!-- Footer -->
  <div class="bottom-text">
    <div class="lyrics">
      YOU SHOULD SEE ME IN A CROWN<br>
      I'M GONNA RUN THIS NOTHING TOWN<br>
      WATCH ME MAKE 'EM BOW<br>
      ONE BY ONE BY ONE
    </div>
    <div class="footer-right">
      <span class="year">2025</span>
      <span class="icon">↘</span>
      <span class="icon">🌐</span>
    </div>
  </div>
</div>

</body>
</html>
